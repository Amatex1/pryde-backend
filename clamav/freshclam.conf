# freshclam configuration — automatic virus database updater
# Docs: https://www.clamav.net/documents/configuration

# Database directory (same as clamd — must match)
DatabaseDirectory /var/lib/clamav

# Update frequency: check for updates 12 times per day (every 2 hours)
Checks 12

# Logging
UpdateLogFile /dev/stdout
LogTime yes

# Use official ClamAV mirrors
DatabaseMirror database.clamav.net

# Run as clamav user
User clamav
