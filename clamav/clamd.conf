# clamd configuration for Pryde ClamAV service on Render
# Docs: https://www.clamav.net/documents/configuration

# Run as foreground process (required for Docker)
Foreground yes

# TCP socket — Render private services communicate over the internal network
TCPSocket 3310
TCPAddr 0.0.0.0

# Disable Unix socket (not needed in Docker/cloud)
# LocalSocket /var/run/clamav/clamd.ctl

# Virus database directory (mapped to a persistent disk on Render)
DatabaseDirectory /var/lib/clamav

# Logging
LogFile /dev/stdout
LogTime yes
LogVerbose no

# File size limits — match the backend upload limit
MaxFileSize 100M
MaxScanSize 100M
MaxRecursion 10
MaxFiles 1000

# Stream settings (used when scanning via TCP)
StreamMaxLength 100M

# User to run as (clamav user is created in the official image)
User clamav
