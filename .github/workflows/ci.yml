name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci

      - name: Run tests
        run: |
          cd server
          npm run test:ci
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/pryde-test
          MONGODB_URI_TEST: mongodb://localhost:27017/pryde-test

      - name: Run coverage
        run: |
          cd server
          npm run test:coverage
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/pryde-test
          MONGODB_URI_TEST: mongodb://localhost:27017/pryde-test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: server/test-results/
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 30

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci

      - name: Run ESLint
        run: |
          cd server
          npm run lint

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Run secret scan
        run: npm run security:scan

  security:
    name: Security Audit (Advisory)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci

      - id: audit
        name: Run npm audit
        continue-on-error: true
        run: |
          cd server
          npm audit --audit-level=high

      - name: Record advisory result
        if: steps.audit.outcome == 'failure'
        run: echo "::warning::High-severity npm audit findings remain. This job is advisory until the dependency backlog is remediated."

  smoke:
    name: Runtime Smoke Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci

      - name: Verify server entrypoint syntax
        run: |
          cd server
          node --check server.js

      - name: Verify critical runtime modules load
        env:
          NODE_ENV: test
        run: |
          cd server
          node --input-type=module -e "const { default: config } = await import('./config/config.js'); if (!config?.frontendURL) throw new Error('Missing frontendURL in config'); const { initRedis } = await import('./utils/redisInit.js'); if (typeof initRedis !== 'function') throw new Error('initRedis export missing');"

  status-check:
    name: All Required Checks Passed
    runs-on: ubuntu-latest
    needs: [test, lint, secret-scan, security, smoke]
    if: always()
    env:
      TEST_RESULT: ${{ needs.test.result }}
      LINT_RESULT: ${{ needs.lint.result }}
      SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
      SECURITY_RESULT: ${{ needs.security.result }}
      SMOKE_RESULT: ${{ needs.smoke.result }}

    steps:
      - name: Enforce required results
        run: |
          failures=0
          for item in "Run Tests:$TEST_RESULT" "Lint Code:$LINT_RESULT" "Secret Scan:$SECRET_SCAN_RESULT" "Runtime Smoke Check:$SMOKE_RESULT"; do
            name="${item%%:*}"
            result="${item##*:}"
            if [ "$result" != "success" ]; then
              echo "❌ $name did not succeed (result=$result)"
              failures=1
            else
              echo "✅ $name passed"
            fi
          done

          if [ "$SECURITY_RESULT" != "success" ]; then
            echo "⚠️ Security Audit (Advisory) did not pass. Review the audit backlog before treating the branch as fully hardened."
          else
            echo "✅ Security Audit (Advisory) passed"
          fi

          if [ "$failures" -ne 0 ]; then
            exit 1
          fi

      - name: Success notification
        run: echo "🎉 Required CI checks passed"
