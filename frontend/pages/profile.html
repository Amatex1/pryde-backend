<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - PRYDE Chat</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="container">
    <h1>👤 My Profile</h1>
    
    <div id="errorMessage" class="error" style="display: none;"></div>
    <div id="successMessage" class="success" style="display: none;"></div>
    
    <div style="text-align: center; margin-bottom: 30px;">
      <img id="profileAvatar" class="profile-avatar-large" src="" alt="Avatar">
      <input type="file" id="avatarInput" accept="image/*" style="display: none;">
      <button onclick="document.getElementById('avatarInput').click()" style="width: auto; padding: 8px 20px; margin-top: 10px;">
        Change Avatar
      </button>
    </div>
    
    <form id="profileForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" disabled>
      </div>
      
      <div class="form-group">
        <label for="displayName">Display Name</label>
        <input type="text" id="displayName" required>
      </div>
      
      <div class="form-group">
        <label for="bio">Bio</label>
        <textarea id="bio" maxlength="500"></textarea>
      </div>
      
      <button type="submit">Update Profile</button>
    </form>
    
    <div class="nav-links">
      <a href="directory.html">Directory</a>
      <a href="chat.html">Chat</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </div>

  <script src="../js/profile.js"></script>
</body>
</html>
