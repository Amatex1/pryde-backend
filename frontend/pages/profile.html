<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - PRYDE Chat</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>My Profile</h1>
      <div class="header-actions">
        <a href="chat.html" class="btn-secondary">Back to Chat</a>
        <button id="logoutBtn" class="btn-secondary">Logout</button>
      </div>
    </header>
    
    <main class="profile-container">
      <div class="profile-avatar">
        <img id="avatarPreview" src="" alt="Profile" class="avatar-large">
        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
        <button id="uploadAvatarBtn" class="btn-primary">Change Avatar</button>
      </div>
      
      <form id="profileForm" class="profile-form">
        <div class="form-group">
          <label for="display_name">Display Name:</label>
          <input type="text" id="display_name" name="display_name" required>
        </div>
        
        <div class="form-group">
          <label for="bio">Bio:</label>
          <textarea id="bio" name="bio" rows="4"></textarea>
        </div>
        
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" disabled>
        </div>
        
        <button type="submit" class="btn-primary">Update Profile</button>
        
        <div id="message" class="message"></div>
      </form>
    </main>
  </div>
  
  <script src="../js/profile.js"></script>
</body>
</html>
