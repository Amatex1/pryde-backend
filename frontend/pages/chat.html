<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - PRYDE Chat</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body {
      display: block;
      padding: 0;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>💬 Chats</h3>
        <div style="margin-top: 10px;">
          <a href="directory.html" style="color: #667eea; text-decoration: none; font-size: 14px;">← Back to Directory</a>
        </div>
      </div>
      <div class="conversations-list" id="conversationsList">
        <p style="padding: 20px; text-align: center; color: #999;">No conversations yet</p>
      </div>
    </div>

    <div class="chat-main">
      <div class="chat-header">
        <div id="chatHeader">
          <h3 id="recipientName">Select a conversation</h3>
        </div>
      </div>

      <div class="messages-container" id="messagesContainer">
        <div style="text-align: center; padding: 40px; color: #999;">
          <p>Select a user to start chatting</p>
        </div>
      </div>

      <div class="chat-input-container">
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button class="attach-btn" id="attachBtn" title="Attach image">📎</button>
        <textarea 
          class="chat-input" 
          id="messageInput" 
          placeholder="Type a message..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn">📤</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="../js/chat.js"></script>
</body>
</html>
