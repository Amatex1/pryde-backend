<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Pryde Chat</title>
  <link rel="stylesheet" href="/frontend/css/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="/frontend/pages/directory.html" class="btn btn-secondary">← Back</a>
      <h1 id="chatTitle">Chat</h1>
      <div class="header-actions">
        <span id="typingIndicator" class="typing-indicator"></span>
      </div>
    </div>
    <div class="chat-container">
      <div id="messages" class="messages"></div>
      <form id="messageForm" class="message-form">
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button type="button" id="imageBtn" class="btn btn-icon">📷</button>
        <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
        <button type="submit" class="btn btn-primary">Send</button>
      </form>
      <div id="imagePreview" class="image-preview" style="display: none;">
        <img id="previewImage" src="" alt="Preview">
        <button id="removeImage" class="btn btn-secondary">×</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="/frontend/js/chat.js"></script>
</body>
</html>
